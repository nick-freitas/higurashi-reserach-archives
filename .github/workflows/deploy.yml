name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream source texts
        run: git clone --depth 1 https://github.com/masagrator/HigurashiENX-texts.git upstream

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Copy sql.js WASM to public
        run: mkdir -p public && cp node_modules/sql.js/dist/sql-wasm.wasm node_modules/sql.js/dist/sql-wasm-browser.wasm public/

      - name: Build SQLite database from upstream + overlays
        run: npx tsx scripts/merge-and-build.ts
        env:
          SOURCE_DIR: ./upstream

      - name: Build frontend
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
